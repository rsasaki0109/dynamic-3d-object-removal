name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare demo site files
        run: |
          mkdir -p site/demo
          cp demo/index.html site/demo/index.html
          cp demo/index_3d.html site/demo/index_3d.html
          cp demo/index_3d_standalone.html site/demo/index_3d_standalone.html
          cp demo/demo_before_after.png site/demo/demo_before_after.png
          cp demo/demo_before_after_3d.png site/demo/demo_before_after_3d.png
          cp demo/demo_comparison.png site/demo/demo_comparison.png
          cp demo/demo_scene.json site/demo/demo_scene.json
          cp demo/demo_input.xyz site/demo/demo_input.xyz
          cp demo/demo_output.xyz site/demo/demo_output.xyz
          cp demo/demo_objects.json site/demo/demo_objects.json
          cat > site/index.html <<'EOF'
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0;url=./demo/index.html" />
    <title>Dynamic Object Removal</title>
  </head>
  <body>
    <p>Redirecting to <a href="./demo/index.html">demo index</a>...</p>
  </body>
</html>
EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
